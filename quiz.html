/* =========================
QUIZ ENGINE
========================= */

const level = localStorage.getItem("currentTest");
const questions = quizzes[level];

let index = 0;
let score = 0;
let answered = false;

const questionElement = document.getElementById("question");
const optionsElement = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");

nextBtn.style.display="none";


function loadQuestion(){

answered = false;

let q = questions[index];

questionElement.innerText = (index+1) + ". " + q.question;

optionsElement.innerHTML = "";

q.options.forEach((option,i)=>{

let btn = document.createElement("button");

btn.innerText = option;
btn.className="option-btn";

btn.onclick = ()=>selectAnswer(btn,i);

optionsElement.appendChild(btn);

});

}


function selectAnswer(button,selected){

if(answered) return;

answered = true;

const correct = questions[index].answer;

const buttons = document.querySelectorAll(".option-btn");

buttons.forEach((btn,i)=>{

btn.disabled=true;

if(i===correct){
btn.style.background="#22c55e";
}

if(i===selected && i!==correct){
btn.style.background="#ef4444";
}

});

if(selected===correct){
score++;
}

nextBtn.style.display="block";

}


nextBtn.onclick = ()=>{

index++;

nextBtn.style.display="none";

if(index < questions.length){
loadQuestion();
}
else{
finishQuiz();
}

};


function finishQuiz(){

saveHistory();

document.querySelector(".quiz-box").innerHTML=

`<h2>Your Score: ${score} / ${questions.length}</h2>
<a href="test.html" class="btn">Back to Tests</a>`;

}

function saveHistory(){

let history = JSON.parse(localStorage.getItem("testHistory")) || [];

history.push({
level:level,
score:score,
total:questions.length,
date:new Date().toLocaleString()
});

localStorage.setItem("testHistory", JSON.stringify(history));

}

loadQuestion();

</script>


<script>

const history = JSON.parse(localStorage.getItem("testHistory"));
const historyList = document.getElementById("historyList");

if(history && history.length > 0){

historyList.innerHTML = "";

history.slice().reverse().forEach(test => {

const div = document.createElement("div");

div.style.marginBottom = "15px";

div.innerHTML = `
<strong>${test.level.toUpperCase()}</strong> Test —
Score: ${test.score}/${test.total}
<br>
<small>${test.date}</small>
`;

historyList.appendChild(div);

});

}
