<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - TimeHop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: 70px; z-index: 1000;
    display: flex; align-items: center;
    padding: 0 48px;
    background: rgba(6,12,26,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,195,255,0.10);
    transition: top 0.4s ease;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
  .logo img { height: 46px; width: auto; filter: drop-shadow(0 0 8px rgba(0,195,255,0.55)); }
  .nav-links { list-style: none; display: flex; gap: 4px; margin: 0 auto; }
  .nav-links a {
    display: block; padding: 7px 15px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; font-weight: 500;
    color: #7a96bb; text-decoration: none;
    border-radius: 6px; transition: 0.2s;
  }
  .nav-links a:hover { color: #e2e8f0; background: rgba(255,255,255,0.06); }
  .nav-links a.active { color: #00c3ff; border-bottom: 2px solid #00c3ff; border-radius: 0; }
  .auth-area { display: flex; align-items: center; gap: 10px; }
  .signin-btn {
    padding: 8px 22px; border-radius: 20px;
    background: linear-gradient(135deg, #00c3ff, #007cf0);
    color: white; border: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: 0.2s;
  }
  .signin-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,195,255,0.4); }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #00c3ff, #007cf0);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: white; cursor: pointer;
  }
  .hidden { display: none !important; }
  .profile { cursor: pointer; }
</style>
</head>

<body>

<nav>
<a href="index.html" class="logo">
  <img src="nav.png" alt="TimeHop Logo">
</a>
<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="past.html">Past</a></li>
<li><a href="present.html">Present</a></li>
<li><a href="future.html">Future</a></li>
<li><a href="test.html">Test</a></li>
<li><a href="courses.html">Courses</a></li>
<li><a href="contact.html" class="active">Contact</a></li>
</ul>
<div class="auth-area">
  <button id="signinBtn" class="signin-btn">Sign In</button>
  <div class="profile hidden" id="profileBox">
    <div class="avatar" id="avatarLetter"></div>
  </div>
</div>
</nav>

<section class="present-hero">

<h1>Contact Us</h1>

<p>
Have questions about AI or the TimeHop platform?  
Send us a message and we will get back to you.
</p>

</section>


<section class="contact-section">

<div class="contact-box">

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea placeholder="Your Message"></textarea>

<button class="btn">Send Message</button>

</div>

</section>


<footer>
<p>© 2026 TimeHop</p>
</footer>
<script src="script.js"></script>
<div id="loginModal" class="login-modal hidden">

<div class="login-box">

<input id="loginName" placeholder="Name">
<input id="loginEmail" placeholder="Email">

<select id="loginGender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<textarea id="loginBio" placeholder="Bio"></textarea>

<button id="createAccount" class="btn">Create Account</button>


</div>
</div>





</body>
</html>
